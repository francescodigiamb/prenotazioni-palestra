# =========================
# PROFILO PRODUZIONE (Railway)
# =========================

# Railway espone la porta nella variabile PORT
server.port=${PORT:8080}

# In produzione conviene cache=true (più performance)
spring.thymeleaf.cache=true

# Log puliti in prod
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
logging.level.root=INFO

# Evita query in view rendering (e consuma meno risorse)
spring.jpa.open-in-view=false

# In produzione le variabili DEVONO esserci (niente fallback)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HTTP Brevo
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}

# Timezone
spring.jackson.time-zone=Europe/Rome

# Base URL obbligatorio in produzione (serve per link email corretti)
app.base-url=${APP_BASE_URL}

# =========================
# OTTIMIZZAZIONE MEMORIA
# =========================

# Tomcat: thread ridotti per traffico basso
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=200

# Hikari pool: 5 connessioni bastano per 250 utenti
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# Hibernate ottimizzato
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.generate_statistics=false

# Riduce picchi RAM allo startup
# spring.main.lazy-initialization=true

# =========================
# ACTUATOR (solo health per Railway)
# =========================
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health