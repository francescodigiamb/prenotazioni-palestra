<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead(${corso.id != null ? 'Modifica corso' : 'Nuovo corso'} + ' — FitnessClub', null)}"></th:block>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .form-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .form-card {
            width: 100%;
            max-width: 640px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2rem 1.75rem;
        }
        @media (max-width: 480px) {
            .form-card { padding: 1.5rem 1.1rem; border-radius: 14px; }
        }
        .section-label {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: .5rem;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-wrap">
        <div class="form-card">

            <div class="mb-4">
                <a href="/admin/corsi" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i>Gestione corsi
                </a>
                <h2 class="fw-bold mt-2 mb-0"
                    th:text="${corso.id != null ? 'Modifica corso' : 'Nuovo corso'}">Corso</h2>
            </div>

            <div th:replace="~{fragments :: alerts}"></div>

            <form th:action="${corso.id} != null ? @{/admin/corsi/{id}(id=${corso.id})} : @{/admin/corsi}" method="post"
                  class="d-grid gap-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Nome -->
                <div>
                    <label class="form-label fw-medium">Nome corso</label>
                    <input class="form-control" type="text" name="nome" th:value="${corso.nome}"
                           placeholder="Es. Yoga, Pilates, CrossFit…" required>
                </div>

                <!-- Descrizione -->
                <div>
                    <label class="form-label fw-medium">Descrizione <span class="text-muted fw-normal">(opzionale)</span></label>
                    <textarea class="form-control" name="descrizione" rows="3"
                              placeholder="Breve descrizione del corso…"
                              th:text="${corso.descrizione}" style="min-height:unset;"></textarea>
                </div>

                <!-- Data + Orario -->
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label fw-medium">Data</label>
                        <input class="form-control" type="date" name="data"
                               th:value="${corso.data != null ? #temporals.format(corso.data, 'yyyy-MM-dd') : ''}" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-medium">Orario</label>
                        <input class="form-control" type="time" name="orario"
                               th:value="${corso.orario != null ? #temporals.format(corso.orario, 'HH:mm') : ''}" required>
                    </div>
                </div>

                <!-- Posti + Chiuso -->
                <div class="row g-3 align-items-center">
                    <div class="col-6">
                        <label class="form-label fw-medium">Posti massimi</label>
                        <input class="form-control" type="number" min="1" name="maxPosti"
                               th:value="${corso.maxPosti}" required>
                    </div>
                    <div class="col-6 d-flex align-items-end" style="padding-bottom:.25rem;">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="chiusoCheck"
                                   name="chiuso" th:checked="${corso.chiuso}">
                            <label class="form-check-label fw-medium" for="chiusoCheck">
                                Chiuso alle prenotazioni
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Bottoni -->
                <div class="d-flex gap-2 pt-1">
                    <a href="/admin/corsi" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-x me-1"></i>Annulla
                    </a>
                    <button type="submit" class="btn btn-dark flex-fill">
                        <i class="bi bi-check-lg me-1"></i>Salva
                    </button>
                </div>
            </form>

        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
