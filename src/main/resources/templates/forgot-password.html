<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recupera password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-5" style="max-width:480px;">
        <h3 class="mb-4">Recupera password</h3>

        <!-- ALERTS -->
        <div th:replace="~{fragments :: alerts}"></div>

        <p class="text-muted">
            Inserisci l’email associata al tuo account.
            Ti invieremo un link per impostare una nuova password.
        </p>

        <form th:action="@{/forgot-password}" method="post" class="d-grid gap-3 mt-3">
            <div>
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Inserisci la tua email" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Invia link di recupero
            </button>

            <a th:href="@{/login}" class="btn btn-outline-secondary">
                Torna al login
            </a>
        </form>
    </div>

    <!-- FOOTER (include Bootstrap JS) -->
    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
