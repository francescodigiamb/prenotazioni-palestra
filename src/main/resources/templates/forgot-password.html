<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Recupera password — FitnessClub', null)}"></th:block>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2rem 1.75rem;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem 1.25rem; }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="auth-wrap">
        <div class="auth-card">

            <div class="text-center mb-4">
                <div class="mb-2" style="font-size:2.5rem; color:#1f1f1f;">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h4 class="fw-bold mb-1">Recupera password</h4>
                <p class="text-muted small mb-0">
                    Inserisci la tua email: ti mandiamo un link per reimpostare la password.
                </p>
            </div>

            <div th:replace="~{fragments :: alerts}"></div>

            <form th:action="@{/forgot-password}" method="post" class="d-grid gap-3">
                <div>
                    <label class="form-label fw-medium">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="tua@email.it" autocomplete="email" required>
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    <i class="bi bi-send me-1"></i>Invia link di recupero
                </button>

                <a th:href="@{/login}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-left me-1"></i>Torna al login
                </a>
            </form>
        </div>
    </div>

    <!-- FOOTER (include Bootstrap JS) -->
    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
