<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- NAVBAR -->
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-5" style="max-width:520px;">
        <h3 class="mb-3">Reimposta password</h3>
        <p class="text-muted mb-4">Inserisci la nuova password e confermala.</p>

        <div th:replace="~{fragments :: alerts}"></div>

        <form th:action="@{/reset-password}" method="post" class="d-grid gap-3">
            <input type="hidden" name="token" th:value="${token}" />

            <div>
                <label class="form-label">Nuova password</label>
                <input type="password" name="password" class="form-control" required minlength="6">
            </div>

            <div>
                <label class="form-label">Conferma password</label>
                <input type="password" name="confirmPassword" class="form-control" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary">Aggiorna password</button>
        </form>

        <div class="mt-3">
            <a href="/login" class="btn btn-outline-secondary w-100">Torna al login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
