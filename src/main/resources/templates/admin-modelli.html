<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Modelli corsi — FitnessClub', null)}"></th:block>
    <style>
        /* Card mobile modelli */
        .admin-modello-card {
            background: #fff;
            border-radius: 14px;
            border-left: 4px solid #dee2e6;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
        }
        .admin-modello-card.m-attivo   { border-left-color: #198754; }
        .admin-modello-card.m-disattivo { border-left-color: #adb5bd; }

        /* Form genera lezioni inline */
        .genera-row { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
        .genera-row .form-control { min-height: 36px; font-size: .85rem; width: auto; flex: 1; min-width: 110px; }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-4">
            <h1 class="fw-bold text-dark m-0">Modelli corsi</h1>
            <a href="/admin/modelli/nuovo" class="btn btn-dark btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuovo modello
            </a>
        </div>

        <div th:replace="~{fragments :: alerts}"></div>

        <div th:if="${#lists.isEmpty(modelli)}" class="alert alert-info">
            Nessun modello definito. Crea un nuovo modello per generare lezioni ricorrenti.
        </div>

        <!-- ========================= -->
        <!-- DESKTOP: tabella         -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(modelli)}" class="d-none d-md-block table-responsive">
            <table class="table table-hover align-middle bg-white rounded-3 overflow-hidden shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>Capienza</th>
                        <th>Stato</th>
                        <th>Genera lezioni</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${modelli}">
                        <td class="fw-medium" th:text="${m.nome}">Pilates</td>
                        <td th:text="${m.maxPostiDefault}">20</td>
                        <td>
                            <span class="badge"
                                  th:text="${m.attivo} ? 'Attivo' : 'Disattivato'"
                                  th:classappend="${m.attivo} ? ' bg-success' : ' bg-secondary'">
                            </span>
                        </td>
                        <td>
                            <form th:action="@{/admin/modelli/{id}/genera(id=${m.id})}" method="post"
                                  class="genera-row">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="date" name="dal" class="form-control form-control-sm" required>
                                <input type="date" name="al"  class="form-control form-control-sm" required>
                                <button class="btn btn-sm btn-outline-dark" type="submit">
                                    <i class="bi bi-calendar-plus me-1"></i>Genera
                                </button>
                            </form>
                        </td>
                        <td>
                            <a class="btn btn-sm btn-outline-dark"
                               th:href="@{/admin/modelli/{id}/modifica(id=${m.id})}">
                                <i class="bi bi-pencil me-1"></i>Modifica
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ========================= -->
        <!-- MOBILE: card             -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(modelli)}" class="d-block d-md-none">
            <div th:each="m : ${modelli}"
                 class="admin-modello-card mb-3 p-3"
                 th:classappend="${m.attivo} ? 'm-attivo' : 'm-disattivo'">

                <div class="d-flex justify-content-between align-items-start mb-1">
                    <span class="fw-bold" th:text="${m.nome}">Pilates</span>
                    <span class="badge ms-2 flex-shrink-0"
                          th:text="${m.attivo} ? 'Attivo' : 'Disattivato'"
                          th:classappend="${m.attivo} ? ' bg-success' : ' bg-secondary'">
                    </span>
                </div>

                <p class="text-muted small mb-3">
                    <i class="bi bi-people me-1"></i>Capienza: <span th:text="${m.maxPostiDefault}">20</span> posti
                </p>

                <!-- Genera lezioni -->
                <form th:action="@{/admin/modelli/{id}/genera(id=${m.id})}" method="post" class="d-grid gap-2 mb-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="d-flex gap-2">
                        <input type="date" name="dal" class="form-control form-control-sm flex-fill" required>
                        <input type="date" name="al"  class="form-control form-control-sm flex-fill" required>
                    </div>
                    <button class="btn btn-sm btn-outline-dark w-100" type="submit">
                        <i class="bi bi-calendar-plus me-1"></i>Genera lezioni
                    </button>
                </form>

                <a class="btn btn-sm btn-dark w-100"
                   th:href="@{/admin/modelli/{id}/modifica(id=${m.id})}">
                    <i class="bi bi-pencil me-1"></i>Modifica modello
                </a>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
