<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Gestione Corsi — FitnessClub', null)}"></th:block>
    <style>
        /* Card mobile admin */
        .admin-corso-card {
            background: #fff;
            border-radius: 14px;
            border-left: 4px solid #dee2e6;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            overflow: hidden;
        }
        .admin-corso-card.stato-aperto  { border-left-color: #198754; }
        .admin-corso-card.stato-chiuso  { border-left-color: #6c757d; }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-4">
            <h1 class="fw-bold text-dark m-0">Gestione corsi</h1>
            <div class="d-flex flex-wrap gap-2">
                <a href="/admin/corsi/nuovo" class="btn btn-dark btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Nuovo corso
                </a>
                <a href="/admin/corsi-archiviati" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-archive me-1"></i>Archiviati
                </a>
                <a href="/corsi" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-eye me-1"></i>Vista pubblica
                </a>
            </div>
        </div>

        <div th:replace="~{fragments :: alerts}"></div>

        <!-- Filtro corsi -->
        <form class="mb-4" method="get" action="/admin/corsi">
            <!-- Riga principale -->
            <div class="d-flex gap-2 align-items-center">
                <input type="text" name="q" class="form-control form-control-sm flex-grow-1"
                       placeholder="Cerca nome corso…" th:value="${q}">
                <!-- Toggle date -->
                <button type="button" class="btn btn-sm btn-outline-secondary flex-shrink-0"
                        data-bs-toggle="collapse" data-bs-target="#filtriDate"
                        th:classappend="${dal != null or al != null} ? ' active' : ''"
                        title="Filtra per data">
                    <i class="bi bi-calendar3"></i>
                </button>
                <button class="btn btn-sm btn-dark flex-shrink-0" type="submit">
                    <i class="bi bi-funnel me-1"></i>Filtra
                </button>
                <a class="btn btn-sm btn-outline-secondary flex-shrink-0" href="/admin/corsi">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
            <!-- Date (collapse) -->
            <div class="collapse mt-2" id="filtriDate"
                 th:classappend="${dal != null or al != null} ? ' show' : ''">
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <div>
                        <label class="form-label mb-1 small fw-medium">Dal</label>
                        <input type="date" name="dal" class="form-control form-control-sm" th:value="${dal}">
                    </div>
                    <div>
                        <label class="form-label mb-1 small fw-medium">Al</label>
                        <input type="date" name="al" class="form-control form-control-sm" th:value="${al}">
                    </div>
                </div>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(corsi)}" class="alert alert-info">
            Nessun corso trovato.
        </div>

        <!-- ========================= -->
        <!-- DESKTOP: tabella         -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(corsi)}" class="d-none d-md-block table-responsive">
            <table class="table table-hover align-middle bg-white rounded-3 overflow-hidden shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>Data</th>
                        <th>Orario</th>
                        <th>Iscritti</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="corso : ${corsi}">
                        <td class="fw-medium" th:text="${corso.nome}">Corso</td>
                        <td th:text="${#temporals.format(corso.data, 'dd/MM/yyyy')}">01/09/2025</td>
                        <td th:text="${#temporals.format(corso.orario, 'HH:mm')}">18:00</td>
                        <td th:text="${prenotatiMap[corso.id]}">0</td>
                        <td>
                            <span th:if="${corso.chiuso}"  class="badge bg-secondary">Chiuso</span>
                            <span th:if="${!corso.chiuso}" class="badge bg-success">Aperto</span>
                        </td>
                        <td>
                            <div class="d-flex flex-wrap gap-1">
                                <a class="btn btn-sm btn-outline-dark"
                                   th:href="@{/corsi/{id}(id=${corso.id})}">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a class="btn btn-sm btn-outline-dark"
                                   th:href="@{/admin/corsi/{id}/modifica(id=${corso.id})}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <!-- Toggle chiusura -->
                                <form th:action="@{/admin/corsi/{id}/toggle-chiusura(id=${corso.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm"
                                            th:classappend="${corso.chiuso} ? 'btn-outline-success' : 'btn-outline-warning'"
                                            th:text="${corso.chiuso} ? 'Riapri' : 'Chiudi'">Chiudi</button>
                                </form>
                                <!-- Elimina -->
                                <form th:action="@{/admin/corsi/{id}/elimina(id=${corso.id})}" method="post" class="d-inline"
                                      data-confirm="Eliminare definitivamente questo corso?">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ========================= -->
        <!-- MOBILE: card             -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(corsi)}" class="d-block d-md-none">
            <div th:each="corso : ${corsi}"
                 class="admin-corso-card mb-3"
                 th:classappend="${corso.chiuso} ? 'stato-chiuso' : 'stato-aperto'">
                <div class="p-3">

                    <!-- Nome + badge stato -->
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <span class="fw-bold" th:text="${corso.nome}">Corso</span>
                        <span th:if="${corso.chiuso}"  class="badge bg-secondary ms-2 flex-shrink-0">Chiuso</span>
                        <span th:if="${!corso.chiuso}" class="badge bg-success ms-2 flex-shrink-0">Aperto</span>
                    </div>

                    <!-- Data / Orario / Iscritti -->
                    <p class="text-muted small mb-3">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${#temporals.format(corso.data, 'dd/MM/yyyy')}">01/09/2025</span>
                        &nbsp;&nbsp;
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${#temporals.format(corso.orario, 'HH:mm')}">18:00</span>
                        &nbsp;&nbsp;
                        <i class="bi bi-people me-1"></i>
                        <span th:text="${prenotatiMap[corso.id]}">0</span> iscritti
                    </p>

                    <!-- Azioni a tutta larghezza -->
                    <div class="d-grid gap-2">
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-dark flex-fill"
                               th:href="@{/corsi/{id}(id=${corso.id})}">
                                <i class="bi bi-eye me-1"></i>Dettagli
                            </a>
                            <a class="btn btn-sm btn-dark flex-fill"
                               th:href="@{/admin/corsi/{id}/modifica(id=${corso.id})}">
                                <i class="bi bi-pencil me-1"></i>Modifica
                            </a>
                        </div>
                        <div class="d-flex gap-2">
                            <!-- Toggle chiusura -->
                            <form th:action="@{/admin/corsi/{id}/toggle-chiusura(id=${corso.id})}" method="post" class="flex-fill">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm w-100"
                                        th:classappend="${corso.chiuso} ? 'btn-outline-success' : 'btn-outline-warning'"
                                        th:text="${corso.chiuso} ? '↑ Riapri' : '✕ Chiudi'">Chiudi</button>
                            </form>
                            <!-- Elimina -->
                            <form th:action="@{/admin/corsi/{id}/elimina(id=${corso.id})}" method="post" class="flex-fill"
                                  data-confirm="Eliminare definitivamente questo corso?">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                                    <i class="bi bi-trash me-1"></i>Elimina
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
