<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pagina non trovata — FitnessClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bg: #F6F3EA; }
        html, body {
            height: 100%;
            background: var(--bg);
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .ghost-num {
            font-size: clamp(6rem, 25vw, 11rem);
            font-weight: 900;
            line-height: 1;
            color: rgba(0,0,0,.06);
            user-select: none;
            letter-spacing: -.03em;
        }
        .error-icon {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #1f1f1f;
            margin-top: -.5rem;
        }
        .btn { border-radius: 10px; min-height: 46px; font-weight: 500; }
    </style>
</head>

<body>
    <div class="ghost-num">404</div>
    <div class="error-icon mb-3"><i class="bi bi-map"></i></div>

    <h1 class="h3 fw-bold mb-2">Pagina non trovata</h1>
    <p class="text-muted mb-4" style="max-width:340px;"
       th:text="${message} ?: 'La risorsa che cerchi non esiste o è stata rimossa.'">
        La risorsa che cerchi non esiste o è stata rimossa.
    </p>

    <div class="d-flex gap-2 flex-wrap justify-content-center">
        <a href="/corsi" class="btn btn-dark px-4">
            <i class="bi bi-calendar3 me-1"></i>Vai ai corsi
        </a>
        <a href="/" class="btn btn-outline-secondary px-4">
            <i class="bi bi-house me-1"></i>Home
        </a>
    </div>

    <p class="mt-5 small text-muted">&copy; 2026 FitnessClub Chieti</p>
</body>

</html>
