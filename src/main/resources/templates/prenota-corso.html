<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block th:replace="~{fragments :: baseHead('Prenota', null)}"></th:block>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-4">

        <div th:replace="~{fragments :: alerts}"></div>

        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                <div class="card shadow-sm">

                    <div class="card-header bg-dark text-white py-2">
                        <h5 class="mb-0" th:text="${corso.nome}">Nome corso</h5>
                    </div>

                    <div class="card-body px-3 py-3">

                        <!-- Riepilogo corso -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between py-1 border-bottom small">
                                <span class="text-muted">Data</span>
                                <strong th:text="${#temporals.format(corso.data, 'dd/MM/yyyy')}"></strong>
                            </div>
                            <div class="d-flex justify-content-between py-1 border-bottom small">
                                <span class="text-muted">Orario</span>
                                <strong th:text="${#temporals.format(corso.orario, 'HH:mm')}"></strong>
                            </div>
                            <div class="d-flex justify-content-between py-1 border-bottom small">
                                <span class="text-muted">Posti disponibili</span>
                                <strong th:text="${postiDisponibili}"></strong>
                            </div>
                            <div class="d-flex justify-content-between py-1 small">
                                <span class="text-muted">Lista d'attesa</span>
                                <strong th:text="${riserveDisponibili}"></strong>
                            </div>
                        </div>

                        <!-- Chi prenota -->
                        <div sec:authorize="isAuthenticated()"
                            class="d-flex align-items-center gap-2 mb-3 p-2 bg-light rounded">
                            <span>👤</span>
                            <div class="small">
                                <div class="text-muted" style="font-size: 0.75rem;">Prenotazione per</div>
                                <strong th:text="${#authentication.principal.domainUser.nome
                                              + ' '
                                              + #authentication.principal.domainUser.cognome}">
                                </strong>
                            </div>
                        </div>

                        <!-- Badge stato -->
                        <div class="mb-3 text-center">
                            <span th:if="${!soloRiserva and !completamentePieno}" class="badge bg-success px-2 py-1">
                                ✓ Posto disponibile
                            </span>
                            <span th:if="${soloRiserva}" class="badge bg-warning text-dark px-2 py-1">
                                ⚠ Lista d'attesa
                            </span>
                            <span th:if="${completamentePieno}" class="badge bg-danger px-2 py-1">
                                ✗ Corso al completo
                            </span>
                        </div>

                        <!-- Form -->
                        <div sec:authorize="isAuthenticated()">
                            <form th:action="@{/prenotazioni}" method="post">
                                <input type="hidden" name="corsoId" th:value="${corso.id}" />
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                                    <button type="submit" class="btn btn-success" th:disabled="${completamentePieno}">
                                        Conferma prenotazione
                                    </button>
                                    <a th:href="@{|/corsi/${corso.id}|}" class="btn btn-outline-secondary">
                                        Annulla
                                    </a>
                                </div>
                            </form>
                        </div>

                        <!-- Non loggato -->
                        <div sec:authorize="!isAuthenticated()" class="alert alert-info mb-0 small">
                            Per prenotare devi <a href="/login">accedere</a>.
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
