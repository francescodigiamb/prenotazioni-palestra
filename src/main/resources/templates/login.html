<!DOCTYPE html>
<html lang="it">

<head>
    <th:block th:replace="~{fragments :: baseHead('Login', null)}"></th:block>
</head>

<body>
    <!-- NAVBAR -->
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-5" style="max-width:480px;">
        <h3 class="mb-4 text-center">Accedi</h3>

        <div th:replace="~{fragments :: alerts}"></div>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="text" name="username" placeholder="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
            </div>

            <div class="row g-2 mt-3">
                <div class="col-6">
                    <button class="btn btn-primary w-100" type="submit">Entra</button>
                </div>
                <div class="col-6">
                    <a href="/" class="btn btn-outline-secondary w-100">Torna alla Home</a>
                </div>
            </div>
        </form>

        <!-- Link sotto i pulsanti, centrati -->
        <div class="text-center mt-3 small">
            <a th:href="@{/forgot-password}">Password dimenticata?</a> <span class="mx-2 text-muted">|</span> <a
                th:href="@{/reinvia-verifica}">Reinvia email di verifica</a>
        </div>

        <!-- Testo sotto (opzionale) -->
        <div class="text-center mt-2 small text-muted">
            Non hai ancora un account? <a href="/register">Registrati</a>
        </div>
    </div>
    </div>
</body>

</html>
