<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Verifica account — FitnessClub', null)}"></th:block>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .result-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .result-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2.5rem 1.75rem;
            text-align: center;
        }
        .result-icon { font-size: 3.5rem; }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="result-wrap">
        <div class="result-card">

            <!-- Successo -->
            <div th:if="${success}">
                <div class="result-icon text-success mb-3"><i class="bi bi-patch-check-fill"></i></div>
                <h4 class="fw-bold mb-2">Account verificato!</h4>
                <p class="text-muted mb-4" th:text="${success}">Account verificato con successo.</p>
                <a href="/login" class="btn btn-dark w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Accedi ora
                </a>
            </div>

            <!-- Errore -->
            <div th:if="${error}">
                <div class="result-icon text-danger mb-3"><i class="bi bi-x-circle-fill"></i></div>
                <h4 class="fw-bold mb-2">Link non valido</h4>
                <p class="text-muted mb-4" th:text="${error}">Il link non è valido.</p>
                <a href="/reinvia-verifica" class="btn btn-dark w-100 mb-2">
                    <i class="bi bi-send me-1"></i>Richiedi nuovo link
                </a>
                <a href="/login" class="btn btn-outline-secondary w-100">Torna al login</a>
            </div>

            <!-- Warning (es. già verificato) -->
            <div th:if="${warning}">
                <div class="result-icon mb-3" style="color:#ffc107;"><i class="bi bi-exclamation-circle-fill"></i></div>
                <h4 class="fw-bold mb-2">Attenzione</h4>
                <p class="text-muted mb-4" th:text="${warning}">Link già utilizzato.</p>
                <a href="/login" class="btn btn-dark w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Vai al login
                </a>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
