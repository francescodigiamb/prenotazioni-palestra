<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Prenotazioni — FitnessClub', null)}"></th:block>
    <style>
        .admin-pren-card {
            background: #fff;
            border-radius: 14px;
            border-left: 4px solid #dee2e6;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
        }
        .admin-pren-card.ha-riserve { border-left-color: #ffc107; }
        .admin-pren-card.tutto-pieno { border-left-color: #dc3545; }
        .admin-pren-card.posti-liberi { border-left-color: #198754; }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-4">
            <h1 class="fw-bold text-dark m-0">Prenotazioni</h1>
            <div class="d-flex flex-wrap gap-2">
                <a href="/admin/corsi" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-calendar3 me-1"></i>Gestione corsi
                </a>
                <a href="/admin/corsi-archiviati" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-archive me-1"></i>Archiviati
                </a>
            </div>
        </div>

        <div th:replace="~{fragments :: alerts}"></div>

        <!-- Filtri -->
        <form class="mb-4" method="get" th:action="@{/admin/prenotazioni}">
            <!-- Riga principale -->
            <div class="d-flex gap-2 align-items-center">
                <select class="form-select form-select-sm flex-grow-1" name="corsoId">
                    <option value="">— tutti i corsi —</option>
                    <option th:each="c : ${corsi}"
                            th:value="${c.id}"
                            th:selected="${selectedCorsoId != null and selectedCorsoId == c.id}"
                            th:text="${c.nome + ' (' + #temporals.format(c.data, 'dd/MM') + ' ' + #temporals.format(c.orario, 'HH:mm') + ')'}">
                    </option>
                </select>
                <!-- Toggle date -->
                <button type="button" class="btn btn-sm btn-outline-secondary flex-shrink-0"
                        data-bs-toggle="collapse" data-bs-target="#filtriDatePren"
                        th:classappend="${dataDa != null or dataA != null} ? ' active' : ''"
                        title="Filtra per data">
                    <i class="bi bi-calendar3"></i>
                </button>
                <button class="btn btn-sm btn-dark flex-shrink-0" type="submit">
                    <i class="bi bi-funnel me-1"></i>Filtra
                </button>
                <a class="btn btn-sm btn-outline-secondary flex-shrink-0" href="/admin/prenotazioni">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
            <!-- Date (collapse) -->
            <div class="collapse mt-2" id="filtriDatePren"
                 th:classappend="${dataDa != null or dataA != null} ? ' show' : ''">
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <div>
                        <label class="form-label mb-1 small fw-medium">Dal</label>
                        <input class="form-control form-control-sm" type="date" name="dataDa" th:value="${dataDa}">
                    </div>
                    <div>
                        <label class="form-label mb-1 small fw-medium">Al</label>
                        <input class="form-control form-control-sm" type="date" name="dataA" th:value="${dataA}">
                    </div>
                </div>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(corsi)}" class="alert alert-info">
            Nessun corso trovato con questi filtri.
        </div>

        <!-- ========================= -->
        <!-- DESKTOP: tabella         -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(corsi)}" class="d-none d-md-block table-responsive">
            <table class="table table-hover align-middle bg-white rounded-3 overflow-hidden shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Corso</th>
                        <th>Data</th>
                        <th>Orario</th>
                        <th class="text-center">Confermati</th>
                        <th class="text-center">Riserve</th>
                        <th class="text-center">Posti</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${corsi}">
                        <td class="fw-medium">
                            <a th:href="@{/admin/corsi/{id}(id=${c.id})}"
                               th:text="${c.nome}" class="text-dark text-decoration-none">Corso</a>
                        </td>
                        <td th:text="${#temporals.format(c.data, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td th:text="${#temporals.format(c.orario, 'HH:mm')}">18:00</td>
                        <td class="text-center">
                            <span class="badge bg-success" th:text="${confermatiMap[c.id]}">0</span>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-warning text-dark" th:text="${riserveMap[c.id]}">0</span>
                        </td>
                        <td class="text-center" th:text="${c.maxPosti}">20</td>
                        <td>
                            <a class="btn btn-sm btn-outline-dark"
                               th:href="@{/admin/corsi/{id}(id=${c.id})}">
                                <i class="bi bi-eye me-1"></i>Dettagli
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ========================= -->
        <!-- MOBILE: card             -->
        <!-- ========================= -->
        <div th:if="${!#lists.isEmpty(corsi)}" class="d-block d-md-none">
            <div th:each="c : ${corsi}"
                 class="admin-pren-card mb-3 p-3"
                 th:classappend="${riserveMap[c.id] > 0 and confermatiMap[c.id] >= c.maxPosti} ? 'ha-riserve'
                               : (${confermatiMap[c.id] >= c.maxPosti} ? 'tutto-pieno' : 'posti-liberi')">

                <div class="d-flex justify-content-between align-items-start mb-1">
                    <span class="fw-bold" th:text="${c.nome}">Corso</span>
                </div>

                <p class="text-muted small mb-2">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(c.data, 'dd/MM/yyyy')}">01/01/2026</span>
                    &nbsp;
                    <i class="bi bi-clock me-1"></i>
                    <span th:text="${#temporals.format(c.orario, 'HH:mm')}">18:00</span>
                </p>

                <div class="d-flex gap-2 mb-3">
                    <span class="badge bg-success">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${confermatiMap[c.id]}">0</span> confermati
                    </span>
                    <span class="badge bg-warning text-dark">
                        <i class="bi bi-hourglass-split me-1"></i>
                        <span th:text="${riserveMap[c.id]}">0</span> riserve
                    </span>
                    <span class="badge bg-secondary">
                        <span th:text="${c.maxPosti}">20</span> posti
                    </span>
                </div>

                <a class="btn btn-sm btn-dark w-100"
                   th:href="@{/admin/corsi/{id}(id=${c.id})}">
                    <i class="bi bi-eye me-1"></i>Vedi dettagli
                </a>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
