<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: baseHead('Modello corso — FitnessClub', null)}"></th:block>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .form-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .form-card {
            width: 100%;
            max-width: 680px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2rem 1.75rem;
        }
        @media (max-width: 480px) {
            .form-card { padding: 1.5rem 1.1rem; border-radius: 14px; }
        }
        /* Righe giorni settimana */
        .giorno-row {
            display: grid;
            grid-template-columns: 140px 1fr 1fr;
            gap: .5rem;
            align-items: center;
            padding: .5rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .giorno-row:last-of-type { border-bottom: none; }
        .giorno-label { display: flex; align-items: center; gap: .4rem; font-weight: 500; }
        @media (max-width: 540px) {
            .giorno-row { grid-template-columns: 1fr 1fr; }
            .giorno-label { grid-column: 1 / -1; }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-wrap">
        <div class="form-card">

            <div class="mb-4">
                <a href="/admin/modelli" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i>Modelli corsi
                </a>
                <h2 class="fw-bold mt-2 mb-0"
                    th:text="${modello.id == null} ? 'Nuovo modello' : 'Modifica modello'">Modello corso</h2>
            </div>

            <div th:replace="~{fragments :: alerts}"></div>

            <form th:action="@{/admin/modelli}" th:object="${modello}" method="post" class="d-grid gap-3">
                <input type="hidden" th:field="*{id}">

                <!-- Nome + Capienza -->
                <div class="row g-3">
                    <div class="col-8">
                        <label class="form-label fw-medium">Nome corso</label>
                        <input type="text" class="form-control" th:field="*{nome}"
                               placeholder="Es. Yoga, Pilates…" required>
                    </div>
                    <div class="col-4">
                        <label class="form-label fw-medium">Capienza</label>
                        <input type="number" class="form-control" th:field="*{maxPostiDefault}" min="1" required>
                    </div>
                </div>

                <!-- Descrizione -->
                <div>
                    <label class="form-label fw-medium">Descrizione <span class="text-muted fw-normal">(opzionale)</span></label>
                    <textarea class="form-control" th:field="*{descrizione}" rows="2"
                              style="min-height:unset;"></textarea>
                </div>

                <!-- Attivo -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{attivo}" id="attivoCheck">
                    <label class="form-check-label fw-medium" for="attivoCheck">Modello attivo</label>
                </div>

                <!-- Programmazione -->
                <div>
                    <div class="fw-bold mb-2 mt-1">
                        <i class="bi bi-calendar-week me-1"></i>Programmazione settimanale
                    </div>
                    <p class="text-muted small mb-3">Seleziona i giorni e inserisci uno o due orari per giorno.</p>

                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{lunedi}" id="lunediCheck">
                            <label for="lunediCheck">Lunedì</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioLunedi}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioLunedi2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{martedi}" id="martediCheck">
                            <label for="martediCheck">Martedì</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioMartedi}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioMartedi2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{mercoledi}" id="mercolediCheck">
                            <label for="mercolediCheck">Mercoledì</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioMercoledi}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioMercoledi2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{giovedi}" id="giovediCheck">
                            <label for="giovediCheck">Giovedì</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioGiovedi}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioGiovedi2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{venerdi}" id="venerdiCheck">
                            <label for="venerdiCheck">Venerdì</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioVenerdi}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioVenerdi2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{sabato}" id="sabatoCheck">
                            <label for="sabatoCheck">Sabato</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioSabato}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioSabato2}">
                    </div>
                    <div class="giorno-row">
                        <div class="giorno-label">
                            <input class="form-check-input" type="checkbox" th:field="*{domenica}" id="domenicaCheck">
                            <label for="domenicaCheck">Domenica</label>
                        </div>
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioDomenica}">
                        <input type="time" class="form-control form-control-sm" th:field="*{orarioDomenica2}">
                    </div>
                </div>

                <!-- Bottoni -->
                <div class="d-flex gap-2 pt-1">
                    <a href="/admin/modelli" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-x me-1"></i>Annulla
                    </a>
                    <button type="submit" class="btn btn-dark flex-fill">
                        <i class="bi bi-check-lg me-1"></i>Salva
                    </button>
                </div>
            </form>

        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>

</html>
